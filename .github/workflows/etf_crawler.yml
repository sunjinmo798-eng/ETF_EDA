name: Naver ETF Automated Data Crawler

on:
  schedule:
    # GitHub Actions 최소 주기인 5분마다 자동 실행 (UTC 기준)
    # 주식 장 운영 시간(평일 09:00 ~ 15:30 KST) 또는 24시간 작동 설정 가능
    - cron: '*/5 * * * *'
  workflow_dispatch: # GitHub 웹 UI에서 수동으로도 즉시 실행할 수 있는 버튼 제공

jobs:
  crawl-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 레포지토리에 자동 커밋 및 푸시 권한 부여

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Naver ETF Data Crawler
        run: |
          python -m src.naver_etf_crawler

      - name: Commit and Push Updated Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --quiet && git diff --staged --quiet || (git commit -m "auto: Update Naver ETF data [$(date -u +'%Y-%m-%d %H:%M:%S UTC')]" && git push)
