name: Update Naver ETF Data

on:
  schedule:
    # 매 5분마다 실행 (GitHub Actions 사정상 다소 지연이 있을 수 있습니다)
    - cron: '*/5 * * * *'
  workflow_dispatch: # 수동 실행 지원

permissions:
  contents: write # 리포지토리에 변경사항을 커밋/푸시하기 위한 권한 설정

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v3

      - name: Python 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 의존성 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas

      - name: ETF 데이터 크롤링 및 저장 실행
        run: |
          # 1. 대시보드용 JSON 데이터 갱신
          python scripts/fetch_etf_data.py
          # 2. 데이터 보관용 CSV 데이터 갱신 (data/ 폴더 내에 저장)
          python src/naver_etf_crawler.py

      - name: 변경사항 커밋 및 푸시
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # docs/ 및 data/ 폴더의 모든 변경 사항을 추적 및 추가
          git add docs/data/etf_latest.json data/
          
          # 변경사항이 있는 경우에만 커밋 및 푸시 진행
          if ! git diff --cached --exit-code; then
            git commit -m "auto: Update Naver ETF data (5min interval)"
            git push
          else
            echo "변경사항이 없어 푸시를 건너뜁니다."
          fi
