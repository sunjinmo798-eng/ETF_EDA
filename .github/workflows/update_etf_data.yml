name: Update Naver ETF Data

on:
  schedule:
    # 매 2시간마다 실행 (UTC 기준)
    - cron: '0 */2 * * *'
  workflow_dispatch: # 수동 실행 지원

permissions:
  contents: write # 리포지토리에 변경사항을 커밋/푸시하기 위한 권한 설정

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v3

      - name: Python 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 의존성 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: ETF 데이터 크롤링 실행
        run: |
          python scripts/fetch_etf_data.py

      - name: 변경사항 커밋 및 푸시
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/etf_latest.json
          
          # 변경사항이 있는 경우에만 커밋 및 푸시 진행
          if ! git diff --cached --exit-code; then
            git commit -m "auto: Update Naver ETF latest data"
            git push
          else
            echo "변경사항이 없어 푸시를 건너뜁니다."
          fi
